<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
        }

        .container {
            width: 40%;
            margin: 100px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Edit Task</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="title" value="{{ task.title }}">
        <button type="submit">Update</button>
    </form>

    <br>
    <a href="/">Back</a>

</div>

</body>
</html>
